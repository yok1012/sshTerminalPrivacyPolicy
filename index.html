<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Terminal Privacy Policy</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        box-sizing: border-box;
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font: inherit;
      }

      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main>
      <pre id="policy">Loading privacy policy...</pre>
      <noscript>
        JavaScript is required to load this page. You can read the privacy
        policy in README.md.
      </noscript>
    </main>
    <script>
      fetch("./README.md")
        .then((response) => {
          if (!response.ok) throw new Error("Failed to load README.md");
          return response.text();
        })
        .then((text) => {
          document.getElementById("policy").textContent = text;
        })
        .catch(() => {
          document.getElementById("policy").innerHTML =
            'Privacy policy could not be loaded. Please open <a href="./README.md">README.md</a>.';
        });
    </script>
  </body>
</html>
